<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="48" fill="#0F172A"/>
  <g transform="translate(128, 128)">
    <circle r="60" stroke="#1E293B" stroke-width="1" />
    <!-- 神经线条/光圈叶片 -->
    <path d="M0 -80 L20 -40 L0 0" stroke="#38BDF8" stroke-width="2" opacity="0.6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </path>
    <path d="M0 -80 L-20 -40 L0 0" stroke="#818CF8" stroke-width="2" opacity="0.6" transform="rotate(72)">
      <animateTransform attributeName="transform" type="rotate" from="72" to="432" dur="20s" repeatCount="indefinite" />
    </path>
    <path d="M0 -80 L20 -40 L0 0" stroke="#38BDF8" stroke-width="2" opacity="0.6" transform="rotate(144)">
      <animateTransform attributeName="transform" type="rotate" from="144" to="504" dur="20s" repeatCount="indefinite" />
    </path>
    <path d="M0 -80 L-20 -40 L0 0" stroke="#818CF8" stroke-width="2" opacity="0.6" transform="rotate(216)">
      <animateTransform attributeName="transform" type="rotate" from="216" to="576" dur="20s" repeatCount="indefinite" />
    </path>
    <path d="M0 -80 L20 -40 L0 0" stroke="#38BDF8" stroke-width="2" opacity="0.6" transform="rotate(288)">
      <animateTransform attributeName="transform" type="rotate" from="288" to="648" dur="20s" repeatCount="indefinite" />
    </path>
    <!-- 中心火花 -->
    <polygon points="0,-15 4,4 15,0 4,4 0,15 -4,-4 -15,0 -4,-4" fill="white">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
    </polygon>
  </g>
</svg>
