services:
  postgres:
    image: postgres:17-alpine
    container_name: remix-studio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: remix_studio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: remix-studio-minio
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DRIVE_MAX_USAGE_PCT: 99
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"