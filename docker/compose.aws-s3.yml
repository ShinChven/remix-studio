services:
  app:
    image: ${REMIX_STUDIO_IMAGE:-ghcr.io/shinchven/remix-studio:latest}
    container_name: ${APP_CONTAINER_NAME:-remix-studio-app}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_EXPORT_BUCKET: ${S3_EXPORT_BUCKET}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-}
      S3_AUTO_CREATE_BUCKET: ${S3_AUTO_CREATE_BUCKET:-false}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      JWT_SECRET: ${JWT_SECRET}
      PROVIDER_ENCRYPTION_KEY: ${PROVIDER_ENCRYPTION_KEY}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-Remix Studio}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      X_CLIENT_ID: ${X_CLIENT_ID:-}
      X_CLIENT_SECRET: ${X_CLIENT_SECRET:-}
      TRUST_PROXY: ${TRUST_PROXY:-}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    volumes:
      - ${BACKUP_DIR:-./volumes/backups}:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-remix-studio-postgres}
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-remix_studio}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_DIR:-./volumes/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-remix_studio}"]
      interval: 5s
      timeout: 5s
      retries: 10
