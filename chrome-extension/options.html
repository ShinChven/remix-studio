<!DOCTYPE html>
<html>
<head>
  <title>Remix Studio Extension Options</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 10px; color: #16a34a; font-size: 14px; }
  </style>
</head>
<body>
  <h2>Remix Studio Configuration</h2>
  <div class="form-group">
    <label for="domain">Remix Studio Domain URL</label>
    <input type="url" id="domain" placeholder="http://localhost:3000">
    <p style="font-size: 12px; color: #666;">Include the protocol (http:// or https://) and no trailing slash.</p>
  </div>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
